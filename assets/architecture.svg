<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>VibeFinder 2.0 System Architecture</title>
<desc>Data flow: User Input to Claude AI Agent or Hardcoded Profiles, through Guardrail Validator, into Recommender Engine (reading from songs.csv), producing Ranked Results. Test Harness and Unit Tests validate the system.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<!-- User Input -->
<rect x="220" y="20" width="240" height="48" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="40" text-anchor="middle" dominant-baseline="central" fill="#085041">User input</text>
<text font-family="sans-serif" font-size="12" x="340" y="57" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Natural language or CLI profile</text>
<!-- Agent path arrow -->
<line x1="290" y1="68" x2="200" y2="118" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="390" y1="68" x2="480" y2="118" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="222" y="102" text-anchor="middle" fill="#888">Agent mode</text>
<text font-family="sans-serif" font-size="12" x="462" y="102" text-anchor="middle" fill="#888">Classic mode</text>
<!-- Claude Agent -->
<rect x="60" y="118" width="220" height="56" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="170" y="139" text-anchor="middle" dominant-baseline="central" fill="#26215C">Claude AI Agent</text>
<text font-family="sans-serif" font-size="12" x="170" y="158" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Interprets mood to structured profile</text>
<!-- Classic Profiles -->
<rect x="400" y="118" width="220" height="56" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="510" y="139" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Hardcoded profiles</text>
<text font-family="sans-serif" font-size="12" x="510" y="158" text-anchor="middle" dominant-baseline="central" fill="#444441">genre, mood, energy, acoustic</text>
<!-- Agent to Guardrail -->
<line x1="170" y1="174" x2="170" y2="220" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Guardrail -->
<rect x="60" y="220" width="220" height="56" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="170" y="241" text-anchor="middle" dominant-baseline="central" fill="#412402">Guardrail validator</text>
<text font-family="sans-serif" font-size="12" x="170" y="260" text-anchor="middle" dominant-baseline="central" fill="#633806">Clamps energy, rejects invalid fields</text>
<!-- Paths to Recommender -->
<path d="M170 276 L170 310 L310 310" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M510 174 L510 310 L370 310" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Recommender -->
<rect x="220" y="290" width="240" height="56" rx="8" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="311" text-anchor="middle" dominant-baseline="central" fill="#042C53">Recommender engine</text>
<text font-family="sans-serif" font-size="12" x="340" y="330" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Scores 30 songs, returns top-K</text>
<!-- Songs CSV -->
<rect x="500" y="300" width="140" height="36" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="570" y="313" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">data/songs.csv</text>
<text font-family="sans-serif" font-size="12" x="570" y="328" text-anchor="middle" dominant-baseline="central" fill="#444441">30 songs catalog</text>
<line x1="500" y1="318" x2="462" y2="318" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Recommender to Output -->
<line x1="340" y1="346" x2="340" y2="390" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Output -->
<rect x="220" y="390" width="240" height="48" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="410" text-anchor="middle" dominant-baseline="central" fill="#085041">Ranked results + explanation</text>
<text font-family="sans-serif" font-size="12" x="340" y="427" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Top-5 songs with score breakdown</text>
<!-- Test Harness -->
<rect x="500" y="390" width="148" height="56" rx="8" fill="#F0997B" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="574" y="411" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Test harness</text>
<text font-family="sans-serif" font-size="12" x="574" y="430" text-anchor="middle" dominant-baseline="central" fill="#712B13">10 cases, confidence score</text>
<line x1="500" y1="415" x2="462" y2="415" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="481" y="408" text-anchor="middle" fill="#888">validates</text>
<!-- Unit Tests -->
<rect x="32" y="390" width="148" height="56" rx="8" fill="#F0997B" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="14" font-weight="500" x="106" y="411" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Unit tests (pytest)</text>
<text font-family="sans-serif" font-size="12" x="106" y="430" text-anchor="middle" dominant-baseline="central" fill="#712B13">15 cases, guardrail tests</text>
<line x1="180" y1="415" x2="218" y2="415" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="199" y="408" text-anchor="middle" fill="#888">validates</text>
</svg>
